<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Média</title>
</head>
<body>

    <style>
        body{
            background-color: greenyellow;
            text-align: center;
            font-size: large;
        }
        

    </style>

    <h1>Simulador de média semestral</h1>


    <form id="formNotas"> 
        <label>Nota 1:</label>
        <input type="number" id="nota1" step="0.1" min="0" max="10" required><br><br>

        <label>Nota 2:</label>
        <input type="number" id="nota2" step="0.1" min="0" max="10" required><br><br>

        <label>Nota 3:</label>
        <input type="number" id="nota3" step="0.1" min="0" max="10" required><br><br>

        <label>Nota 4:</label>
        <input type="number" id="nota4" step="0.1" min="0" max="10" required><br><br>

        <button type="button" conclick="calcularMedia()">Calcular</button>
    </form>

    <div id="resultado"></div>

    <script>
        function calcularMedia() {
            let n1 = parseFloat(document.getElementById("nota1").value);
            let n2 = parseFloat(document.getElementById("nota2").value);
            let n3 = parseFloat(document.getElementById("nota3").value);
            let n4 = parseFloat(document.getElementById("nota4").value);


            if (
                isNaN(n1) || isNaN(n2) || isNaN(n3) || isNaN(n4) ||
                n1 < 0 || n1 > 10 ||
                n2 < 0 || n2 > 10 ||
                n3 < 0 || n3 > 10 ||
                n4 < 0 || n4 > 10
            ) {
                document.getElementById("resultado").innerHTML =
                    "<p style='color:red;'>Por favor, insira todas as notas entre 0 e 10.</p>";
                return;
            }

            let media = (n1 + n2 + n3 + n4) / 4;

            let situacao = media >= 7 ? "Aprovado" : "Reprovado";

            document.getElementById("resultado").innerHTML =
                "<p>Média: " + media.toFixed(2) + " - " + situacao + "</p>";
        }
    </script>

    <footer>
        <p>Desenvolvido por Gabriel Inácio Juwer</p>
    </footer>

</body>
</html>
